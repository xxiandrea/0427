<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exercise27</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  .header {
    background: #8bc34a;
    height: 80px;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  .main-content {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .main-content .block {
    background: #00bcd4;
    height: 80px;
    border-radius: 4px;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
  }

  .footer-grid .block {
    background: #cfd8dc;
    height: 60px;
    border-radius: 4px;
  }

  @media (max-width: 480px) {
    .main-content {
      grid-template-columns: 1fr;
    }

    .main-content .block {
      height: 50px;
    }

    .footer-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header"></div>
  <div class="main-content">
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
  </div>
  <div class="footer-grid">
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
  </div>
</div>
</body>
</html>
