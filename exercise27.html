<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise27</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: #58b4f5;
            padding: 15px;
            border-radius: 8px;
        }

        .green-box {
            width: 100%;
            height: 120px;
            background-color: #a2d149;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .middle-section {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .cyan-box {
            flex: 1;
            height: 180px;
            background-color: #00bcd4;
            border-radius: 4px;
        }

        .bottom-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .gray-box {
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .middle-section {
                flex-direction: column;
            }

            .bottom-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="green-box"></div>
        
        <div class="middle-section">
            <div class="cyan-box"></div>
            <div class="cyan-box"></div>
        </div>

        <div class="bottom-section">
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
        </div>
    </div>

</body>
</html>
