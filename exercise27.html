<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Practice</title>
    <style>
        body {
            background-color: #55acee;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
        }

        .header {
            background-color: #bad847;
            height: 80px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .content-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .box {
            background-color: #25d3ea;
            flex: 1;
            height: 100px;
            border-radius: 5px;
        }

        .footer-group {
            display: flex;
            gap: 10px;
        }

        .small-box {
            background-color: #eeeeee;
            flex: 1;
            height: 40px;
            border-radius: 5px;
        }

        @media screen and (max-width: 480px) {
            .content-group {
                flex-direction: column;
            }
            
            .box {
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header"></div>
        
        <div class="content-group">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
        
        <div class="footer-group">
            <div class="small-box"></div>
            <div class="small-box"></div>
            <div class="small-box"></div>
        </div>
    </div>

</body>
</html>
