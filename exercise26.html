<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>exercise26</title>
    <style>
        body {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 50px;
        }

        .img-container {
            width: 33%;
            display: flex;
            justify-content: center;
        }

        .img-1 {
            width: 100%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
        }

        .img-2 {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        .img-3 {
            width: 100%;
            height: 300px;
            object-fit: fill;
        }
    </style>
</head>
<body>

    <div class="img-container">
        <img src="https://picsum.photos/400/600" class="img-1">
    </div>

    <div class="img-container" style="width: auto;">
        <img src="https://picsum.photos/400/400" class="img-2">
    </div>

    <div class="img-container">
        <img src="https://picsum.photos/400/600" class="img-3">
    </div>

</body>
</html>
