<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Exercise - Button Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap');

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            margin: 0;
        }

        .web-page-container {
            background-color: #ffffff;
            width: 550px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .image-box {
            width: 496px; 
            height: 240px;
            background-color: #e0e0e0;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .button-container {
            width: 496px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-end; 
            margin-bottom: 20px;
        }

        #info-btn {
           
            height: 22px; 
            border-radius: 8px;

            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            
            cursor: pointer;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: all 0.2s ease;
        }

        #info-btn:hover {
            background-color: #f5f5f5;
        }

        #details-panel {
            width: 496px;
            margin: 0 auto;
            display: none;
            padding: 15px;
            background-color: #f9f9f9;
            border-top: 1px solid #eeeeee;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #707070;
            line-height: 1.8;
        }

        .info-label {
            color: #212121;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="web-page-container">
        <div class="image-box">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=496&h=240" alt="Landscape">
        </div>

        <div class="button-container">
            <button id="info-btn">查看資訊</button>
        </div>

        <div id="details-panel">
            <div><span class="info-label">日期：</span>2017/10/12</div>
            <div><span class="info-label">解析度：</span>480 x 240</div>
            <div><span class="info-label">儲存路徑：</span>/volumes/design_center/images/sample.jpg</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('info-btn');
        const panel = document.getElementById('details-panel');

        btn.addEventListener('click', function() {
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        });
    </script>

</body>
</html>
